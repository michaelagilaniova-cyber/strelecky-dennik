                        <div className="w-6 h-6 rounded-full bg-cyan-100 text-cyan-700 flex items-center justify-center font-bold text-xs shrink-0">
                           {index + 1}.
                        </div>
                        <div className="flex-1">
                          <div className="font-bold text-base text-gray-800 leading-tight">{archer.name}</div>
                          <div className="text-[10px] text-gray-500">{archer.division} • {archer.age}</div>
                        </div>
                      </div>
                      
                      <div className="p-3 bg-white flex justify-around text-center border-b border-gray-100 z-10 relative">
                        <div>
                          <div className="text-[10px] text-gray-500 uppercase font-semibold">Spolu bodov</div>
                          <div className="text-2xl font-black text-cyan-600">{stats.total}</div>
                        </div>
                        <div>
                          <div className="text-[10px] text-gray-500 uppercase font-semibold">Počet šípov</div>
                          <div className="text-2xl font-black text-gray-700">{stats.shotCount}</div>
                        </div>
                        <div>
                          <div className="text-[10px] text-gray-500 uppercase font-semibold">Priemer</div>
                          <div className="text-2xl font-black text-gray-700">{stats.avg}</div>
                        </div>
                      </div>

                      {/* Tlačidlo na rozbalenie Štatistiky */}
                      <div className="bg-gray-50 no-print">
                        <button 
                           onClick={() => toggleStats(archer.id)} 
                           className="w-full py-2.5 px-3 text-cyan-700 text-xs font-bold flex items-center justify-between hover:bg-gray-100 transition-colors"
                        >
                           <span>Štatistika</span>
                           {shouldShowStats ? <ChevronUp className="w-4 h-4"/> : <ChevronDown className="w-4 h-4"/>}
                        </button>
                      </div>
                        
                      {shouldShowStats && (
                        <div className="p-3 bg-white space-y-4 border-t border-gray-100">
                          
                          {/* TABUĽKA ZÁSAHOV */}
                          <div>
                             <h4 className="text-[10px] font-bold text-gray-500 uppercase mb-2">Zásahy</h4>
                             <div className="grid grid-cols-5 gap-1.5 mt-2">
                               {scoreOptions.map(score => {
                                  const count = stats.hits[score] || 0;
                                  if (count === 0 && score < 8) return null;
                                  const bgColor = getHitColorHex(score, is3D);
                                  const txtColor = getTextColorForBg(bgColor);
                                  
                                  return (
                                    <div key={score} className="flex flex-col border border-gray-200 rounded overflow-hidden shadow-sm">
                                      <div style={{backgroundColor: bgColor, color: txtColor}} className={`text-center text-[11px] font-bold py-1 border-b border-gray-200`}>
                                        {score} b
                                      </div>
                                      <div className="text-center py-1 bg-white text-gray-800 text-sm font-bold">
                                        {count}x
                                      </div>
                                    </div>
                                  )
                               })}
                             </div>
                          </div>

                          {/* Štatistika odchýlok a chýb s prepínačom Graf / Text */}
                          <div className="pt-3 border-t border-gray-100">
                             
                             <div className="flex items-center justify-between mb-2">
                                <h4 className="text-[10px] font-bold text-gray-500 uppercase">Tendencia letu a odhad</h4>
                                <button onClick={() => setShowGraphs(!showGraphs)} className="text-[10px] text-cyan-600 font-semibold bg-cyan-50 px-2 py-0.5 rounded no-print">
                                  {showGraphs ? 'Zobraziť tabuľku' : 'Zobraziť graficky'}
                                </button>
                             </div>
                             
                             {!showGraphs ? (
                                /* ZOBRAZENIE CEZ GRAFY (Zameriavací kríž) */
                                <div className="flex flex-col gap-3">
                                   <div className="flex flex-col items-center justify-center p-3 bg-gray-50 rounded border border-gray-100">
                                      <div className="text-[10px] font-bold text-gray-600 flex flex-col items-center mb-1">
                                         <span className="text-cyan-600">{totalDir.Nad}x</span>
                                         <span className="text-lg leading-none">⬆️</span>
                                      </div>
                                      <div className="flex items-center justify-between w-full max-w-[160px]">
                                         <div className="text-[10px] font-bold text-gray-600 flex gap-1 items-center"><span className="text-lg leading-none">⬅️</span><span className="text-cyan-600">{totalDir['Vľavo']}x</span></div>
                                         <Target className="w-8 h-8 text-gray-300 stroke-1" />
                                         <div className="text-[10px] font-bold text-gray-600 flex gap-1 items-center"><span className="text-cyan-600">{totalDir['Vpravo']}x</span><span className="text-lg leading-none">➡️</span></div>
                                      </div>
                                      <div className="text-[10px] font-bold text-gray-600 flex flex-col items-center mt-1">
                                         <span className="text-lg leading-none">⬇️</span>
                                         <span className="text-cyan-600">{totalDir.Pod}x</span>
                                      </div>
                                   </div>
                                   
                                   {is3D && (
                                     <div className="space-y-1.5 mt-1 text-xs">
                                         <div className="bg-emerald-50 border border-emerald-100 rounded px-2 py-1.5 flex justify-between items-center">
                                            <span className="text-emerald-800"><b>Presný odhad:</b> {stats.distStats.exact}x</span>
                                            {stats.distStats.exact > 0 && <span className="text-[10px] text-emerald-600 bg-white px-1.5 rounded font-bold border border-emerald-100 shadow-sm">Zisk: {(stats.distStats.exactScoreSum/stats.distStats.exact).toFixed(1)} b/šíp</span>}
                                         </div>
                                         <div className="bg-amber-50 border border-amber-100 rounded px-2 py-1.5">
                                            <div className="flex justify-between items-center mb-0.5">
                                               <span className="text-amber-800"><b>Menej (Podhodnotené):</b> {stats.distStats.underCount}x</span>
                                               {stats.distStats.underCount > 0 && <span className="text-[10px] text-amber-600 bg-white px-1.5 rounded font-bold border border-amber-100 shadow-sm">Zisk: {(stats.distStats.underScoreSum/stats.distStats.underCount).toFixed(1)} b/šíp</span>}
                                            </div>
                                            {stats.distStats.underCount > 0 && <div className="text-[9.px] text-amber-700/80">Priemerná chyba: <b>{(stats.distStats.underSum / stats.distStats.underCount).toFixed(1)} m</b></div>}
                                         </div>
                                         <div className="bg-red-50 border border-red-100 rounded px-2 py-1.5">
                                            <div className="flex justify-between items-center mb-0.5">
                                               <span className="text-red-800"><b>Viac (Nadhodnotené):</b> {stats.distStats.overCount}x</span>
                                               {stats.distStats.overCount > 0 && <span className="text-[10px] text-red-600 bg-white px-1.5 rounded font-bold border border-red-100 shadow-sm">Zisk: {(stats.distStats.overScoreSum/stats.distStats.overCount).toFixed(1)} b/šíp</span>}
                                            </div>
                                            {stats.distStats.overCount > 0 && <div className="text-[9px] text-red-700/80">Priemerná chyba: <b>{(stats.distStats.overSum / stats.distStats.overCount).toFixed(1)} m</b></div>}
                                         </div>
                                     </div>
                                   )}
                                </div>
                             ) : (
                                /* ZOBRAZENIE CEZ TEXT (Tabuľka) */
                                <div className="grid grid-cols-1 gap-3">
                                   <div className="bg-gray-50 p-2 border border-gray-100 rounded">
                                      {Object.keys(stats.scoreDirStats).length === 0 ? (
                                         <div className="text-[10px] text-gray-400 italic">Bez dát.</div>
                                      ) : (
                                         <div className="text-[10px] text-gray-600 space-y-1">
                                            {Object.keys(stats.scoreDirStats).sort((a,b)=>b-a).map(score => {
                                               const dirData = stats.scoreDirStats[score];
                                               if (Object.keys(dirData).length === 0) return null;
                                               return (
                                                  <div key={score} className="flex gap-2">
                                                     <b className="text-gray-800 w-8 text-right shrink-0">{score} b:</b> 
                                                     <span>{Object.entries(dirData).sort((a,b)=>b[1]-a[1]).map(([dir, count]) => `${count}x ${dir}`).join(', ')}</span>
                                                  </div>
                                               )
                                            })}
                                         </div>
                                      )}
                                   </div>
                                </div>
                             )}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* TLAČIDLO PRE ROZBALENIE ROZPISU (NO-PRINT) */}
              <div className="bg-white rounded-lg shadow-sm border border-gray-200 mt-6 no-print">
                 <button 
                    onClick={() => setShowTargetBreakdown(!showTargetBreakdown)} 
                    className="w-full p-3 font-bold text-gray-800 flex items-center justify-between hover:bg-gray-50 transition"
                 >
                    <span className="flex items-center gap-2"><Target className="w-4 h-4 text-cyan-600" /> Rozpis jednotlivých terčov</span>
                    {showTargetBreakdown ? <ChevronUp className="w-5 h-5"/> : <ChevronDown className="w-5 h-5"/>}
                 </button>
              </div>

              {/* DETAILNÝ PREHĽAD TERČOV (SO VŠETKÝM AJ S OBRÁZKOM) */}
              {((isExporting ? exportSettings.targets : showTargetBreakdown)) && (
                <div className={`space-y-4 ${showTargetBreakdown || isExporting ? 'mt-4' : ''}`}>
                  {activeRound.targetData.map((t, idx) => (
                    <div key={idx} className="bg-white p-3 rounded-lg border border-gray-200 print-break-inside shadow-sm">
                      <div className="flex items-center justify-between mb-2 pb-2 border-b border-gray-100">
                        <div className="text-sm font-bold text-gray-700 flex items-center gap-2">
                           <div className="w-6 h-6 rounded-full bg-cyan-100 text-cyan-800 flex items-center justify-center text-xs shrink-0">{idx + 1}</div>
                           {t.name ? t.name : `Terč ${idx + 1}`}
                        </div>
                        {is3D && (
                            <input 
                              type="number"
                              placeholder="Skutočná (m)"
                              value={t.actualDist}
                              onChange={(e) => updateActualDistance(idx, e.target.value)}
                              className="w-20 p-1 text-[10px] border border-gray-300 rounded text-center outline-none no-print"
                            />
                        )}
                        {is3D && t.actualDist && (
                           <div className="text-xs font-bold text-gray-600 hidden print-only">{t.actualDist} m</div>
                        )}
                      </div>

                      <div className="space-y-3">
                         {activeRound.archers.map(archer => {
                             const aData = t.archers[archer.id];
                             // Preskočiť strelca, ak robíme individuálny export a toto nie je on
                             if (isExporting && exportSettings.archerId !== 'all' && exportSettings.archerId !== archer.id) return null;
                             
                             if (!aData || !aData.visualHits?.length) return null;

                             return (
                                 <div key={archer.id} className="flex justify-between items-start">
                                    <div className="flex-1">
                                       <div className="text-xs font-bold text-gray-700">{archer.name} {is3D && aData.estimatedDist && <span className="font-normal text-gray-500"> (Odhad: {aData.estimatedDist}m)</span>}</div>
                                       
                                       <div className="flex flex-wrap gap-1.5 mt-1.5">
                                          {aData.visualHits.map((vh, i) => {
                                              if (!vh) return null;
                                              const bgColor = getHitColorHex(vh.score, is3D);
                                              const txtColor = getTextColorForBg(bgColor);
                                              return (
                                                 <div key={i} className="flex items-center gap-1">
                                                     <div style={{backgroundColor: bgColor, color: txtColor}} className="w-5 h-5 flex items-center justify-center font-bold rounded text-[10px] border border-gray-300 shadow-sm">
                                                        {vh.score}
                                                     </div>
                                                     {vh.directions && vh.directions.length > 0 && (
                                                         <span className="text-[9px] text-gray-500 font-medium">
                                                            {vh.directions.join(', ')}
                                                         </span>
                                                     )}
                                                 </div>
                                              );
                                          })}
                                       </div>
                                    </div>
                                    
                                    <div className="w-[60px] shrink-0 ml-2">
                                        <TargetFace hits={aData.visualHits} readOnly={true} is3D={is3D} />
                                    </div>
                                 </div>
                             );
                         })}
                      </div>
                      
                      {t.notes && <div className="mt-2 text-xs text-gray-500 italic bg-gray-50 p-2 rounded border border-gray-100">Poznámka: {t.notes}</div>}
                      {t.photo && <img src={t.photo} alt="Terč" className="mt-2 h-20 rounded shadow-sm border border-gray-200 print-break-inside"/>}
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="p-3 bg-white border-t border-gray-200 flex flex-col gap-2 no-print shadow-[0_-4px_10px_rgba(0,0,0,0.05)] z-10">
              <button 
                onClick={saveToHistory}
                className="w-full bg-cyan-600 text-white font-bold p-3 rounded-lg flex items-center justify-center gap-2 text-sm shadow hover:bg-cyan-700"
              >
                <Save className="w-4 h-4" /> Uložiť do histórie
              </button>
              <button 
                onClick={() => confirmAction("Naozaj zahodiť tento tréning?", () => { setActiveRound(null); setStep(1); })}
                className="w-full bg-white text-red-500 font-bold p-2.5 rounded-lg flex items-center justify-center gap-1 text-xs border border-red-200 hover:bg-red-50 transition-colors"
              >
                <Trash2 className="w-3 h-3" /> Zahodiť tréning
              </button>
            </div>
            
            {/* Vylepšený Modal pre Export */}
            {exportDialog && (
              <div className="fixed inset-0 bg-black/60 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4">
                <div className="bg-white rounded-t-2xl sm:rounded-xl p-5 w-full max-w-sm shadow-2xl animate-slide-up">
                  <div className="flex justify-between items-center mb-5 border-b border-gray-100 pb-3">
                     <h3 className="text-lg font-bold text-gray-900">Export a Zdieľanie</h3>
                     <button onClick={() => setExportDialog(false)} className="text-gray-400 hover:bg-gray-100 p-1.5 rounded-full transition"><X className="w-5 h-5"/></button>
                  </div>
                  
                  <button onClick={handleShareText} className="w-full mb-6 bg-gray-50 border border-gray-200 text-gray-700 font-semibold py-3 px-4 rounded-xl flex items-center justify-center gap-2 hover:bg-cyan-50 hover:text-cyan-700 hover:border-cyan-200 transition-colors shadow-sm">
                     <FileText className="w-5 h-5"/> Rýchly textový sumár do správy
                  </button>

                  <div className="">
                     <p className="text-[10px] font-bold text-gray-400 uppercase mb-3 px-1">Nastavenie grafického reportu</p>
                     
                     <div className="space-y-2 mb-5">
                        <select 
                          className="w-full p-3 bg-white rounded-xl border border-gray-200 text-sm font-semibold text-gray-700 outline-none focus:ring-2 focus:ring-cyan-500 shadow-sm"
                          value={exportSettings.archerId}
                          onChange={(e) => setExportSettings({...exportSettings, archerId: e.target.value})}
                        >
                          <option value="all">Všetci strelci spoločne</option>
                          {allStats.map(({archer}) => (
                            <option key={archer.id} value={archer.id}>Len strelec: {archer.name}</option>
                          ))}
                        </select>
                     
                        <label className="flex items-center gap-3 p-3 bg-white rounded-xl cursor-pointer border border-gray-200 shadow-sm hover:border-cyan-300 transition">
                           <input type="checkbox" checked={exportSettings.stats} onChange={e => setExportSettings({...exportSettings, stats: e.target.checked})} className="w-5 h-5 text-cyan-600 rounded border-gray-300 focus:ring-cyan-500" />
                           <span className="text-sm font-semibold text-gray-700">Zahrnúť štatistiku zásahov</span>
                        </label>
                        <label className="flex items-center gap-3 p-3 bg-white rounded-xl cursor-pointer border border-gray-200 shadow-sm hover:border-cyan-300 transition">
                           <input type="checkbox" checked={exportSettings.targets} onChange={e => setExportSettings({...exportSettings, targets: e.target.checked})} className="w-5 h-5 text-cyan-600 rounded border-gray-300 focus:ring-cyan-500" />
                           <span className="text-sm font-semibold text-gray-700">Zahrnúť detailný rozpis terčov</span>
                        </label>
                     </div>
                     
                     <div className="flex gap-2">
                        <button onClick={() => triggerExport('png')} className="flex-1 py-3 px-2 bg-cyan-600 text-white text-xs font-bold rounded-xl hover:bg-cyan-700 shadow-md flex flex-col items-center justify-center gap-1.5 transition-transform active:scale-95">
                           <ImageFile className="w-5 h-5"/> Uložiť Obrázok
                        </button>
                        <button onClick={() => triggerExport('pdf')} className="flex-1 py-3 px-2 bg-emerald-600 text-white text-xs font-bold rounded-xl hover:bg-emerald-700 shadow-md flex flex-col items-center justify-center gap-1.5 transition-transform active:scale-95">
                           <Printer className="w-5 h-5"/> Tlačiť / PDF
                        </button>
                     </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      return (
        <>
          {content}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-xl p-5 w-full max-w-sm shadow-2xl transform transition-all">
                <h3 className="text-lg font-bold text-gray-900 mb-2">Upozornenie</h3>
                <p className="text-gray-600 font-medium mb-6">{confirmDialog.message}</p>
                <div className="flex gap-3">
                  <button onClick={closeConfirm} className="flex-1 p-3 bg-gray-100 text-gray-700 text-sm font-semibold rounded-lg hover:bg-gray-200">Zrušiť</button>
                  <button onClick={confirmDialog.onConfirm} className="flex-1 p-3 bg-red-500 text-white text-sm font-semibold rounded-lg hover:bg-red-600">Áno</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }
    
    const loadingScreen = document.getElementById('loading-screen');
    if (loadingScreen) loadingScreen.remove();

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
