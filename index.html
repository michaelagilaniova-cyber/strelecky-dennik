                            <div className="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm font-bold text-gray-600 shrink-0">
                              {idx + 1}
                            </div>
                            <div>
                              {is3D && t.name && <div className="text-sm font-semibold text-gray-700">{t.name}</div>}
                              {!is3D && <div className="text-sm font-semibold text-gray-700">Terč {idx + 1}</div>}
                            </div>
                        </div>
                        {is3D && (
                            <input 
                              type="number"
                              placeholder="Skutočná vzd. (m)"
                              value={t.actualDist}
                              onChange={(e) => updateActualDistance(idx, e.target.value)}
                              className="w-24 p-1.5 text-sm border border-gray-300 rounded text-center focus:ring-1 outline-none"
                            />
                        )}
                      </div>

                      {/* Výstrely a odchýlky jednotlivých strelcov na tomto terči */}
                      <div className="space-y-3 pl-10 border-l-2 border-gray-200 ml-4">
                         {activeRound.archers.map(archer => {
                             const aData = t.archers[archer.id];
                             if (!aData || !aData.visualHits?.length) return null;

                             return (
                                 <div key={archer.id} className="text-sm">
                                    <div className="font-semibold text-gray-700 mb-1">{archer.name}</div>
                                    
                                    <div className="flex flex-col gap-1.5">
                                       {/* Zobrazenie odhadu vzdialenosti */}
                                       {is3D && aData.estimatedDist && (
                                           <div className="text-xs text-gray-500 bg-white border border-gray-100 rounded px-2 py-1 inline-block w-max mb-1 shadow-sm">
                                              Odhad: <b className="text-gray-700">{aData.estimatedDist} m</b>
                                           </div>
                                       )}

                                       {/* Zoznam výstrelov pekne pod sebou */}
                                       {aData.visualHits.map((vh, i) => {
                                           if (!vh) return null;
                                           return (
                                              <div key={i} className="flex items-center gap-2">
                                                  <div className={`w-6 h-6 flex items-center justify-center font-bold rounded ${getScoreColor(vh.score, is3D)} text-xs shadow-sm border border-black/10 shrink-0`}>
                                                     {vh.score}
                                                  </div>
                                                  {vh.directions && vh.directions.length > 0 && (
                                                      <span className="text-[10px] text-cyan-700 bg-cyan-50 px-2 py-0.5 rounded border border-cyan-200 font-medium">
                                                         {vh.directions.join(' a ')}
                                                      </span>
                                                  )}
                                                  {(!vh.directions || vh.directions.length === 0) && (
                                                      <span className="text-[10px] text-gray-400 italic">Bez označenej odchýlky</span>
                                                  )}
                                              </div>
                                           );
                                       })}
                                    </div>
                                    
                                    {/* Grafické zobrazenie tohto jedného terča a strelca */}
                                    <div className="mt-2">
                                        <div className="w-20">
                                            <TargetFace hits={aData.visualHits} readOnly={true} is3D={is3D} />
                                        </div>
                                    </div>
                                 </div>
                             );
                         })}
                      </div>

                      {/* Poznámky a fotky tohto terča */}
                      {(t.notes || t.photo) && (
                          <div className="pl-10 ml-4 mt-1 pt-2 border-t border-gray-200">
                             {t.notes && <p className="text-xs text-gray-600 italic">"{t.notes}"</p>}
                             {t.photo && <img src={t.photo} alt="Terč" className="mt-2 h-16 rounded shadow-sm border border-gray-300"/>}
                          </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

            </div>

            <div className="p-4 bg-white border-t border-gray-200 flex flex-col gap-3">
              <button 
                onClick={saveToHistory}
                className="w-full bg-cyan-600 text-white font-bold p-4 rounded-xl flex items-center justify-center gap-2 text-lg shadow-md hover:bg-cyan-700 transition-colors"
              >
                <Save className="w-5 h-5" /> Uložiť tréning do histórie
              </button>
              <button 
                onClick={() => {
                  confirmAction("Naozaj chcete zahodiť tento tréning? Údaje sa neuložia a navždy sa stratia.", () => {
                    setActiveRound(null);
                    setStep(1);
                  });
                }}
                className="w-full bg-white text-red-500 font-bold p-4 rounded-xl flex items-center justify-center gap-2 text-lg border border-red-200 shadow-sm hover:bg-red-50 transition-colors"
              >
                <Trash2 className="w-5 h-5" /> Zahodiť bez uloženia
              </button>
            </div>
          </div>
        );
      }

      return (
        <>
          {content}
          {confirmDialog.isOpen && (
            <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
              <div className="bg-white rounded-xl p-5 w-full max-w-sm shadow-2xl transform transition-all">
                <h3 className="text-lg font-bold text-gray-900 mb-2">Upozornenie</h3>
                <p className="text-gray-600 font-medium mb-6">{confirmDialog.message}</p>
                <div className="flex gap-3">
                  <button onClick={closeConfirm} className="flex-1 p-3 bg-gray-100 text-gray-700 font-semibold rounded-lg hover:bg-gray-200">Zrušiť</button>
                  <button onClick={confirmDialog.onConfirm} className="flex-1 p-3 bg-red-500 text-white font-semibold rounded-lg hover:bg-red-600">Áno</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
